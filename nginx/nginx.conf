# ===========================================
# Nginx Configuration — Reverse Proxy + Static Frontend
# / → Vanilla HTML/CSS/JS (served directly)
# /api/ → Django backend
# /media/ → Uploaded files
# /static/ → Django static files
# ===========================================

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name localhost;

    # Max upload size for product images and payment slips
    client_max_body_size 10M;

    # --- Django API endpoints ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Admin panel ---
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Uploaded media files (product images, payment slips) ---
    location /media/ {
        alias /usr/share/nginx/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Django static files (admin CSS/JS) ---
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Frontend: Vanilla HTML/CSS/JS ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

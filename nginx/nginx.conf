# ===========================================
# Nginx Reverse Proxy Configuration
# Routes: /api/ and /admin/ → Django backend
#         /media/ → uploaded files (product images, payment slips)
#         /static/ → Django static files
#         / → React frontend (SPA)
# ===========================================

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name localhost;

    # Max upload size for product images and payment slips
    client_max_body_size 10M;

    # --- Django API endpoints ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Django Admin panel ---
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Uploaded media files (product images, payment slips) ---
    location /media/ {
        alias /usr/share/nginx/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Django static files (admin CSS/JS) ---
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- React frontend (SPA with client-side routing) ---
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

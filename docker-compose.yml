# ===========================================
# Docker Compose — Sell_Web E-Commerce Platform
# Services: PostgreSQL, Redis, Django, Celery, Nginx
# Frontend: Vanilla HTML/CSS/JS served by Nginx (ไม่ต้อง Node.js)
# Usage: docker compose up --build
# ===========================================

services:
  # --- Database: PostgreSQL 15 ---
  # Primary data store for users, products, orders
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sell_web}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Message Broker: Redis 7 ---
  # Used by Celery for async task queue (stock deduction, etc.)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Backend: Django REST Framework ---
  # API server with JWT auth, Google OAuth, rate limiting
  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  # --- Celery Worker ---
  # Background task processor (stock deduction on delivery)
  # Uses same image as backend, but skips entrypoint (no migrations)
  celery:
    build: ./backend
    entrypoint: []
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      - backend

  # --- Reverse Proxy + Frontend: Nginx ---
  # Serves HTML/CSS/JS directly (no Node.js needed)
  # Routes: /api/ → Django, /media/ → uploads, / → static frontend
  nginx:
    build: ./nginx
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html   # Vanilla HTML/CSS/JS
      - media_data:/usr/share/nginx/media
      - static_data:/usr/share/nginx/static
    depends_on:
      - backend

# --- Persistent Volumes ---
volumes:
  postgres_data:
  media_data:
  static_data:

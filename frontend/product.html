<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดสินค้า — Sell Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/product-detail.css">
  <link rel="stylesheet" href="/css/cart.css">
</head>
<body>

  <!-- ========== Navbar ========== -->
  <nav class="navbar">
    <a href="/" class="navbar-logo">
      <div class="navbar-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>
      </div>
      <div>
        <div class="navbar-logo-text">SellWeb</div>
        <div class="navbar-logo-sub">MARKETPLACE</div>
      </div>
    </a>
    <ul class="navbar-menu">
      <li><a href="/">สินค้า</a></li>
      <li><a href="/buyer.html">คำสั่งซื้อ</a></li>
      <li><a href="/seller.html">ร้านของฉัน</a></li>
    </ul>
    <div class="navbar-spacer"></div>
    <!-- Cart Button -->
    <button class="cart-badge" onclick="openCart()">
      🛒 <span class="cart-badge-count" id="cart-badge-count" style="display:none;">0</span>
    </button>
    <div class="navbar-user">
      <a href="/login.html" class="btn btn-primary" id="nav-login-btn" style="padding:8px 20px;font-size:13px;">เข้าสู่ระบบ</a>
      <div id="nav-user-menu" class="hidden" style="display:flex;align-items:center;gap:8px;">
        <div class="navbar-avatar" id="nav-avatar">U</div>
        <button class="btn btn-outline" onclick="logout()" style="padding:6px 14px;font-size:12px;">ออก</button>
      </div>
    </div>
  </nav>

  <!-- Back Link -->
  <a href="/" class="back-link">← กลับหน้าสินค้า</a>

  <!-- ========== Product Detail ========== -->
  <div class="product-detail" id="product-detail">
    <!-- Loading skeleton -->
    <div class="product-detail-image">
      <div class="skeleton" style="width:100%;aspect-ratio:1;"></div>
    </div>
    <div class="product-detail-info">
      <div class="skeleton" style="height:32px;width:70%;margin-bottom:12px;"></div>
      <div class="skeleton" style="height:20px;width:40%;margin-bottom:20px;"></div>
      <div class="skeleton" style="height:36px;width:50%;margin-bottom:20px;"></div>
      <div class="skeleton" style="height:80px;width:100%;"></div>
    </div>
  </div>

  <!-- ========== Cart Drawer ========== -->
  <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2>🛒 ตะกร้าสินค้า</h2>
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>ยอดรวม</span>
        <span class="amount" id="cart-total-amount">฿0</span>
      </div>
      <button class="btn btn-primary" id="checkout-btn" onclick="checkout()">สั่งซื้อ</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    // ดึง product ID จาก URL
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    let currentProduct = null;

    async function loadProduct() {
      if (!productId) {
        window.location.href = '/';
        return;
      }

      try {
        const product = await api.get(`/products/${productId}/`);
        currentProduct = product;
        document.title = `${product.title} — Sell Web`;
        renderProduct(product);

        // Track view behavior
        if (UserStore.isLoggedIn()) {
          api.post('/analytics/track/', { product: product.id, action: 'VIEW' });
        }
      } catch (err) {
        document.getElementById('product-detail').innerHTML = `
          <div class="empty-state" style="width:100%;">
            <h2>ไม่พบสินค้า</h2>
            <p>สินค้านี้อาจถูกลบหรือไม่มีอยู่ในระบบ</p>
            <a href="/" class="btn btn-primary" style="margin-top:16px;">กลับหน้าสินค้า</a>
          </div>`;
      }
    }

    function renderProduct(p) {
      const stockClass = p.quantity > 0 ? 'in-stock' : 'out-of-stock';
      const stockText = p.quantity > 0 ? `มีสินค้า ${p.quantity} ชิ้น` : 'สินค้าหมด';

      document.getElementById('product-detail').innerHTML = `
        <div class="product-detail-image">
          <img src="${p.image || '/img/placeholder.svg'}" alt="${escapeHtml(p.title)}"
               onerror="this.src='/img/placeholder.svg'">
        </div>
        <div class="product-detail-info">
          <h1>${escapeHtml(p.title)}</h1>
          <div class="product-detail-seller">ผู้ขาย: ${p.seller ? p.seller.username : 'ไม่ระบุ'}</div>
          <div class="product-detail-price">฿${Number(p.unit_price).toLocaleString()}</div>
          <div class="product-detail-desc">${escapeHtml(p.description || 'ไม่มีรายละเอียด')}</div>
          <div class="product-detail-stock ${stockClass}">${stockText}</div>
          ${p.quantity > 0 ? `
            <div class="qty-selector">
              <label>จำนวน:</label>
              <input type="number" id="qty-input" value="1" min="1" max="${p.quantity}">
              <span style="font-size:13px;color:var(--color-text-light);">/ ${p.quantity} ชิ้น</span>
            </div>
            <div class="product-detail-actions">
              <button class="btn btn-primary" onclick="addProductToCart()">🛒 เพิ่มลงตะกร้า</button>
              <button class="btn btn-outline" onclick="buyNow()">⚡ ซื้อเลย</button>
            </div>
          ` : `
            <div class="product-detail-actions">
              <button class="btn btn-outline" disabled>สินค้าหมด</button>
            </div>
          `}
        </div>
      `;
    }

    function addProductToCart() {
      if (!currentProduct) return;
      const qty = parseInt(document.getElementById('qty-input').value) || 1;
      Cart.add(currentProduct, qty);
    }

    function buyNow() {
      if (!UserStore.isLoggedIn()) {
        window.location.href = '/login.html';
        return;
      }
      addProductToCart();
      openCart();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    // Init
    document.addEventListener('DOMContentLoaded', loadProduct);
  </script>

</body>
</html>

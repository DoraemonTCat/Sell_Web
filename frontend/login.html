<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — Sell Web</title>
  <meta name="description" content="เข้าสู่ระบบ Sell Web ด้วย Google Account หรือ Email">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/login.css">
  <!-- Google Identity Services (สำหรับ Google Sign-In) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

  <div class="login-page">

    <!-- ========== Left: Branding + Phone Mockup ========== -->
    <div class="login-branding">
      <div class="login-branding-content">
        <!-- Phone Mockup (ตามภาพ reference) -->
        <div class="phone-mockup">
          <div class="phone-mockup-header">
            <span>☰ Storemesh</span>
            <span>🔍</span>
          </div>
          <div class="phone-mockup-body">
            <div class="phone-mockup-title">สินค้าทั้งหมด</div>
            <div class="phone-mockup-item"></div>
            <div class="phone-mockup-item"></div>
            <div class="phone-mockup-item"></div>
            <div class="phone-mockup-item"></div>
          </div>
        </div>
        <div class="branding-title">Storemesh</div>
        <div class="branding-subtitle">ระบบซื้อ-ขายสินค้าออนไลน์<br>จัดการง่าย ครบจบในที่เดียว</div>
      </div>
    </div>

    <!-- ========== Right: Login Form ========== -->
    <div class="login-form-container">
      <div class="login-form-box">
        <h1 class="login-form-title">เข้าสู่ระบบ</h1>
        <p class="login-form-subtitle">ยินดีต้อนรับสู่ Storemesh</p>

        <!-- Role hint -->
        <p id="role-hint" style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;min-height:18px;">
        </p>

        <div class="divider"><span>Google Account</span></div>

        <!-- Google Sign-In Button -->
        <div id="google-signin-btn" style="margin-bottom: 16px;"></div>

      </div>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
      // --- Role Toggle ---
      // window.selectedRole is read by handleGoogleCallback in auth.js
      window.selectedRole = 'buyer';

      const roleHints = {

        seller: 'สำหรับร้านค้าที่ต้องการขายสินค้า',
      };

      function setRole(role) {
        window.selectedRole = role;
        document.querySelectorAll('#role-toggle button').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.role === role);
        });
        document.getElementById('role-hint').textContent = roleHints[role] || '';
      }

      // Set initial hint
      setRole('buyer');

      // --- Redirect if already logged in ---
      if (UserStore.isLoggedIn()) {
        window.location.href = '/';
      }

      // --- Init Google Auth ---
      window.addEventListener('load', initGoogleAuth);
    </script>

</body>

</html>

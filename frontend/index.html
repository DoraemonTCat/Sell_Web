<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sell Web — ร้านค้าออนไลน์</title>
  <meta name="description" content="ระบบซื้อ-ขายสินค้าออนไลน์ พร้อมระบบชำระเงิน ใบส่งของ และ AI แนะนำสินค้า">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/products.css">
  <link rel="stylesheet" href="/css/cart.css">
</head>

<body>

  <!-- ========== Navbar ========== -->
  <nav class="navbar" id="main-navbar">
    <!-- Logo -->
    <a href="/" class="navbar-logo">
      <div class="navbar-logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z" />
        </svg>
      </div>
      <div>
        <div class="navbar-logo-text">Storemesh</div>
        <div class="navbar-logo-sub">MARKETPLACE</div>
      </div>
    </a>

    <!-- Menu Links (web only) -->
    <ul class="navbar-menu">
      <li><a href="/" class="active">สินค้า</a></li>
      <li><a href="/buyer.html">คำสั่งซื้อ</a></li>
      <li><a href="/seller.html">ร้านของฉัน</a></li>
    </ul>

    <div class="navbar-spacer"></div>

    <!-- Cart Button -->
    <button class="cart-badge" onclick="openCart()">
      🛒 <span class="cart-badge-count" id="cart-badge-count" style="display:none;">0</span>
    </button>

    <!-- Search Bar (web only) -->
    <div class="navbar-search">
      <span class="navbar-search-icon">🔍</span>
      <input type="text" id="nav-search-input" placeholder="ค้นหาสินค้า...">
    </div>

    <!-- Hamburger (mobile only) -->
    <button class="navbar-hamburger" id="hamburger-btn" onclick="toggleMobileMenu()">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
      </svg>
    </button>

    <!-- User Section -->
    <div class="navbar-user">
      <a href="/login.html" class="btn btn-primary" id="nav-login-btn"
        style="padding:8px 20px;font-size:13px;">เข้าสู่ระบบ</a>
      <div id="nav-user-menu" class="hidden" style="display:flex;align-items:center;gap:8px;">
        <div class="navbar-avatar" id="nav-avatar">U</div>
        <button class="btn btn-outline" onclick="logout()" style="padding:6px 14px;font-size:12px;">ออก</button>
      </div>
    </div>
  </nav>

  <!-- ========== Page Layout: Sidebar + Main ========== -->
  <div class="page-layout">

    <!-- Sidebar Filter (web only) -->
    <aside class="sidebar" id="sidebar-filter">
      <div class="sidebar-title">ตัวกรอง</div>

      <label for="filter-min-price">ราคาขั้นต่ำ</label>
      <input type="number" id="filter-min-price" placeholder="฿ ต่ำสุด" min="0" onchange="applyFilters()">

      <label for="filter-max-price">ราคาสูงสุด</label>
      <input type="number" id="filter-max-price" placeholder="฿ สูงสุด" min="0" onchange="applyFilters()">

      <label for="search-input">ค้นหา</label>
      <input type="text" id="search-input" placeholder="ชื่อสินค้า..."
        onkeypress="if(event.key==='Enter')applyFilters()">

      <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="applyFilters()">กรอง</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="content-header">
        <h1>สินค้าทั้งหมด</h1>
        <select class="sort-select" id="sort-select" onchange="applyFilters()">
          <option value="-created_at">ใหม่ล่าสุด</option>
          <option value="unit_price">ราคา: ต่ำ → สูง</option>
          <option value="-unit_price">ราคา: สูง → ต่ำ</option>
          <option value="title">ชื่อ: ก → ฮ</option>
        </select>
      </div>

      <!-- Product List -->
      <div class="product-list" id="product-list">
        <!-- Rendered by products.js -->
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>

      <!-- ========== AI Recommendations ========== -->
      <div id="recommendations-section" style="margin-top:32px;">
        <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">🤖 สินค้าแนะนำสำหรับคุณ</h2>
        <div class="rec-grid" id="recommendations-list">
          <div class="skeleton" style="height:200px;"></div>
        </div>
      </div>
      <style>
        .rec-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
          gap: 16px;
        }

        .rec-grid .product-card {
          cursor: pointer;
          border-radius: 8px;
          overflow: hidden;
          border: 1px solid var(--color-border-light);
          transition: box-shadow .2s;
        }

        .rec-grid .product-card:hover {
          box-shadow: 0 4px 16px rgba(0, 0, 0, .1);
        }

        .rec-grid .product-card-image {
          width: 100%;
          height: 160px;
          object-fit: cover;
          display: block;
        }

        .rec-grid .product-card-body {
          padding: 10px 12px;
        }

        .rec-grid .product-card-title {
          font-size: 14px;
          font-weight: 500;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .rec-grid .product-card-price {
          font-size: 15px;
          font-weight: 700;
          color: var(--color-primary);
          margin-top: 4px;
        }
      </style>
    </main>
  </div>

  <!-- ========== Cart Drawer ========== -->
  <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2>🛒 ตะกร้าสินค้า</h2>
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>ยอดรวม</span>
        <span class="amount" id="cart-total-amount">฿0</span>
      </div>
      <button class="btn btn-primary" id="checkout-btn" onclick="checkout()">สั่งซื้อ</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/products.js"></script>
  <script>
    // Mobile menu toggle
    function toggleMobileMenu() {
      const sidebar = document.getElementById('sidebar-filter');
      sidebar.style.display = sidebar.style.display === 'block' ? 'none' : 'block';
    }

    // AI Recommendations
    async function loadRecommendations() {
      const container = document.getElementById('recommendations-list');
      try {
        const data = await api.get('/analytics/recommendations/');
        const products = Array.isArray(data) ? data : (data.results || []);

        if (!products.length) {
          document.getElementById('recommendations-section').style.display = 'none';
          return;
        }

        container.innerHTML = products.map(p => `
          <div class="product-card" onclick="viewProduct(${p.id})">
            <img class="product-card-image" src="${p.image || '/img/placeholder.svg'}"
                 alt="${escapeHtml(p.title)}" onerror="this.src='/img/placeholder.svg'">
            <div class="product-card-body">
              <div class="product-card-title">${escapeHtml(p.title)}</div>
              <div class="product-card-price">฿${Number(p.unit_price).toLocaleString()}</div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('recommendations-section').style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadRecommendations, 500); // โหลดหลัง product list
    });
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก — Sell Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

  <div class="login-page">
    <!-- Left: Branding -->
    <div class="login-branding">
      <div class="login-branding-content">
        <div class="phone-mockup">
          <div class="phone-mockup-header">
            <span>☰ SellWeb</span>
            <span>🔍</span>
          </div>
          <div class="phone-mockup-body">
            <div class="phone-mockup-title">สินค้าทั้งหมด</div>
            <div class="phone-mockup-item"></div>
            <div class="phone-mockup-item"></div>
            <div class="phone-mockup-item"></div>
          </div>
        </div>
        <div class="branding-title">SellWeb</div>
        <div class="branding-subtitle">กรอกข้อมูลเพิ่มเติมเพื่อเริ่มใช้งาน</div>
      </div>
    </div>

    <!-- Right: Register Form -->
    <div class="login-form-container">
      <div class="login-form-box">
        <h1 class="login-form-title">สมัครสมาชิก</h1>
        <p class="login-form-subtitle">กรอกข้อมูลเพื่อเริ่มต้นใช้งาน</p>

        <form id="register-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="reg-username">ชื่อผู้ใช้ (username)</label>
            <input type="text" id="reg-username" class="form-input" placeholder="เช่น somchai_shop" required minlength="3">
          </div>
          <div class="form-group">
            <label for="reg-email">อีเมล</label>
            <input type="email" id="reg-email" class="form-input" disabled>
            <small style="color:var(--color-text-light);font-size:12px;">อีเมลจาก Google Account (แก้ไขไม่ได้)</small>
          </div>
          <div class="form-group">
            <label for="reg-address">ที่อยู่จัดส่ง</label>
            <textarea id="reg-address" class="form-input" rows="3" placeholder="บ้านเลขที่ ถนน ตำบล อำเภอ จังหวัด รหัสไปรษณีย์" required></textarea>
          </div>
          <div class="form-group">
            <label>คุณต้องการ</label>
            <div style="display:flex;gap:12px;margin-top:6px;">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:10px 16px;border:2px solid var(--color-border);border-radius:8px;flex:1;justify-content:center;" id="role-buyer-label">
                <input type="radio" name="role" value="buyer" checked onchange="updateRoleStyle()"> 🛒 ซื้อสินค้า
              </label>
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:10px 16px;border:2px solid var(--color-border);border-radius:8px;flex:1;justify-content:center;" id="role-seller-label">
                <input type="radio" name="role" value="seller" onchange="updateRoleStyle()"> 🏪 ขายสินค้า
              </label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;" id="register-btn">บันทึกข้อมูล</button>
        </form>

        <div class="login-footer">
          มีบัญชีแล้ว? <a href="/login.html">เข้าสู่ระบบ</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Pre-fill email from stored user
    const user = UserStore.get();
    if (user) {
      document.getElementById('reg-email').value = user.email || '';
      document.getElementById('reg-username').value = user.username || '';
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'กำลังบันทึก...';

      try {
        const role = document.querySelector('input[name="role"]:checked').value;
        const data = await api.patch('/auth/register/', {
          username: document.getElementById('reg-username').value,
          address: document.getElementById('reg-address').value,
          role: role,
        });

        if (data.id) {
          UserStore.set(data);
          showToast('สมัครสมาชิกสำเร็จ!');
          setTimeout(() => window.location.href = '/', 1000);
        } else if (data.username) {
          showToast(data.username[0], 'error');
        } else {
          showToast('เกิดข้อผิดพลาด', 'error');
        }
      } catch (err) {
        showToast('เกิดข้อผิดพลาด', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'บันทึกข้อมูล';
      }
    }

    // Role toggle style
    function updateRoleStyle() {
      const val = document.querySelector('input[name="role"]:checked').value;
      document.getElementById('role-buyer-label').style.borderColor = val === 'buyer' ? 'var(--color-primary)' : 'var(--color-border)';
      document.getElementById('role-seller-label').style.borderColor = val === 'seller' ? 'var(--color-primary)' : 'var(--color-border)';
    }
    updateRoleStyle();

    // Redirect if not logged in
    if (!UserStore.isLoggedIn()) {
      window.location.href = '/login.html';
    }
  </script>

</body>
</html>
